# Curator render context — JSON Schema (Draft 2020-12) authored as YAML.
#
# All variables available to a curator extractor / judge / synthesis
# template at render time. Built by curator/prompts.py from the engine
# plan plus upstream task outputs and passed to render.sh as a single
# YAML or JSON file. Templates reference fields by namespaced path
# (e.g. {{ classify.quintet.media }}) rather than via flat ${task:...}
# placeholders. The renderer's --allow-unused flag is the intended
# interaction: every render call passes the full superset; templates
# take what they need; missing-but-referenced fields fail
# StrictUndefined.
#
# Key invariants:
#   1. All values arrive as native Python types after YAML/JSON load.
#      No leaf is a YAML-dumped string of structured data.
#   2. A bag is present iff its dependencies are satisfied. classify
#      is absent until the classify task is done; upstream.<id> is
#      present iff <id> is in the current task's transitive
#      depends_on chain.
#   3. The schema is the entire contract between engine and templates.
#      Adding a field is a schema_version bump.

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://github.com/artyomgo/dotfiles/curator/render-context.schema.yaml
title: Curator render context

type: object
required: [schema_version, task, run, source, quintet, upstream, peers]
additionalProperties: false

properties:

  schema_version:
    type: integer
    const: 1
    # Bumped on any breaking change. Templates may branch on the
    # version (e.g. {% if schema_version >= 2 %}) but the floor of
    # support should stay narrow — drop old branches when the engine
    # stops emitting them.

  # ── current task ───────────────────────────────────────────
  task:
    $ref: '#/$defs/Task'
    # The task currently being rendered. Always present.

  # ── run identity ───────────────────────────────────────────
  run:
    $ref: '#/$defs/Run'
    # Identity of the curator run. Always present.

  # ── source artifacts ───────────────────────────────────────
  source:
    $ref: '#/$defs/Source'
    # Raw + converted source artifacts and metadata. Always present
    # so templates can safely substitute ``source.converted_path``
    # etc.; inner fields are null until the relevant tool task
    # (fetch / convert / security_scan) has produced output.

  # ── quintet config ─────────────────────────────────────────
  quintet:
    $ref: '#/$defs/QuintetConfig'
    # Static input / config for the classify task — vocabulary path
    # and (inlined) slot definitions. Always present in every render
    # context. Classify's OUTPUT (the actual quintet values + topic)
    # lives under `upstream.classify.output` for tasks that depend
    # on classify.

  # ── upstream data flow ─────────────────────────────────────
  upstream:
    type: object
    # One entry per task in the current task's transitive
    # depends_on chain. Each entry carries the upstream task's
    # parsed output.yaml plus its parsed verdict.yaml (if any).
    # Always present (possibly empty) so templates can safely
    # test ``upstream.<id> is defined`` without first checking
    # whether the bag itself exists. Each render call sees only
    # the subgraph relevant to it — NOT a flat global namespace.
    additionalProperties:
      $ref: '#/$defs/UpstreamTask'

  # ── peers (pre-filtered) ───────────────────────────────────
  peers:
    type: array
    # Pre-filtered list of agent extractor peers — transitive
    # upstream dependencies that are kind=agent and produce data
    # the current task may cite. Excludes `classify` (its data is
    # at upstream.classify.output.quintet / .topic, treated
    # specially) and tool tasks (fetch / convert / security_scan
    # — their data is at `source.*`). Templates iterate `peers`
    # directly with no filtering required.
    items:
      $ref: '#/$defs/UpstreamTask'

  # ── per-kind layout config ─────────────────────────────────
  destinations:
    type: object
    # Static config. Same shape for every render call within a run.
    additionalProperties:
      $ref: '#/$defs/Destination'

  # ── shared template assets ─────────────────────────────────
  templates:
    $ref: '#/$defs/TemplatesBag'
    # Absolute paths to shared templates the rendered prompts may
    # need (e.g. wiki layout for synthesis pages).

$defs:

  Task:
    type: object
    required: [id, kind, workdir, output_path]
    additionalProperties: false
    properties:
      id:           { type: string }
      kind:         { enum: [tool, agent, human] }
      template:
        type: [string, 'null']
        # Extractor template family (kind name) for kind=agent
        # tasks; null for tool/human tasks.
      agent_role:
        type: [string, 'null']
        # Sub-agent role to dispatch (curator-extractor /
        # curator-judge / curator-composer).
      workdir:                { type: string }
      # Extractor side. The pair (prompt_path, output_path) is the
      # extractor's I/O contract: the agent reads prompt_path and
      # writes output_path.
      prompt_path:            { type: [string, 'null'] }
      output_path:            { type: string }
      # Judge side. Parallel pair (judge_prompt_path,
      # judge_output_path): the judge reads judge_prompt_path,
      # reads the extractor's output_path, and writes
      # judge_output_path. Null when the task has no judge stage.
      judge_prompt_path:      { type: [string, 'null'] }
      judge_output_path:      { type: [string, 'null'] }
      depends_on:
        type: array
        items: { type: string }

  Run:
    type: object
    required: [workdir, basename, replica_root]
    additionalProperties: false
    properties:
      workdir:   { type: string }
      basename:  { type: string }
      replica_root:
        type: string
        # Absolute path to the vault-replica staging directory under
        # the workdir. Synthesis pages land here; apply-replica
        # walks the directory at the end of the run.
      origin:
        type: [string, 'null']
        # URL or absolute path passed to `curator ingest`.
      ingested_at:
        type: [string, 'null']
        format: date-time

  Source:
    type: object
    additionalProperties: false
    properties:
      fetched_path:
        type: [string, 'null']
        # Path to the raw fetched file (HTML, PDF, audio, ...).
      converted_path:
        type: [string, 'null']
        # Path to the markdown the convert task produced.
      container_metadata:
        type: object
        additionalProperties: true
        # Free-form metadata extracted by the convert task (origin
        # URL, author, title, fetched_at, ...). Templates should
        # defensively check for fields they consume — the convert
        # task may not populate every field for every source kind.
      security_scan:
        type: object
        additionalProperties: true
        # Output of secure-llm's heuristic scanner.
        properties:
          findings:
            type: array
            items: { type: object }

  QuintetConfig:
    type: object
    required: [path]
    additionalProperties: false
    # Static input / config for the classify task. Always present
    # in every render context. Classify's OUTPUT (a Quintet of
    # actual values + a topic string) lives under
    # `upstream.classify.output` for any task that depends on
    # classify.
    properties:
      path:
        type: string
        # Absolute path to the package-local quintet vocabulary
        # file. The classify extractor + judge include it directly
        # via `{% include 'curator/quintet.yaml' %}` — no `slots`
        # variable is passed through the context. Other templates
        # can reference the path in prose if they need the agent
        # to look up vocabulary.

  Quintet:
    type: object
    required: [media, form, register, discipline, audience]
    additionalProperties: false
    properties:
      media:      { type: string }
      form:       { type: string }
      register:   { type: string }
      discipline: { type: string }
      audience:   { type: string }

  UpstreamTask:
    type: object
    required: [task_id, output, verdict]
    additionalProperties: false
    properties:
      task_id: { type: string }
      kind:    { enum: [tool, agent, human] }
      status:  { enum: [pending, running, done, failed] }
      output:
        # Parsed contents of the upstream task's output.yaml. Per-
        # task schema; the curator render context does not constrain
        # the inner shape (each kind has its own schema under
        # templates/extractors/<kind>/schema.yaml).
        type: [object, array, string, number, boolean, 'null']
      verdict:
        # Parsed contents of the upstream task's verdict.yaml; null
        # if the upstream task had no judge stage.
        anyOf:
          - { type: 'null' }
          - { $ref: '#/$defs/Verdict' }
      task_path:    { type: string }
      verdict_path: { type: [string, 'null'] }

  Verdict:
    type: object
    required: [verdict]
    additionalProperties: true
    properties:
      verdict:    { enum: [ACCEPT, REVIEW, REJECT] }
      reasoning:  { type: string }
      _rubric:    { type: object }
      item_verdicts:
        type: array
        items: { type: object }

  Destination:
    type: object
    required: [mode, folder]
    additionalProperties: false
    properties:
      mode:   { enum: [artifact, synthesis] }
      folder:
        type: [string, 'null']
        # Vault folder (e.g. '12 KEYWORDS') for mode=artifact.
        # Null for mode=synthesis. Always present so templates
        # can `{% if dest.folder %}` without an existence check.

  TemplatesBag:
    type: object
    additionalProperties: false
    properties:
      wiki_template_path:  { type: string }
      vault_templates_dir: { type: string }

