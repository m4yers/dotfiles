type: object
required:
- _rubric
- verdict
- reasoning
- item_verdicts
- issues
properties:
  _rubric:
    description: >-
      Per-dimension rubric definitions used by this judgment. Keys
      are dimension names (snake_case derived from the judge prompt's
      bold criterion headers); values are short textual descriptions
      copied from the prompt. Provided so downstream consumers can
      understand the scoring axes without re-reading the prompt.
    type: object
    minProperties: 1
    additionalProperties:
      type: string
      minLength: 5
  verdict:
    description: >-
      Overall verdict, derived deterministically from item_verdicts:
      any item with verdict=REJECT → overall REJECT; otherwise any
      verdict=REVIEW → overall REVIEW; all ACCEPT → overall ACCEPT.
    type: string
    enum:
    - ACCEPT
    - REVIEW
    - REJECT
  reasoning:
    description: >-
      One-paragraph summary of why this verdict was chosen, naming
      the item_verdicts that drove the outcome.
    type: string
    minLength: 30
  item_verdicts:
    description: >-
      Per-item rubric application. For judges scoring a list (e.g.,
      keywords, people, models, topics, citations), emit one entry
      per item with `target=<item.name>` matching the upstream
      output's name verbatim. For judges scoring a single output
      (e.g., classify, summary), emit one entry with `target=null`
      for the whole-output rubric. A judge may also emit extra
      target=null entries to score per-output dimensions alongside
      per-item ones (e.g., compose's `deduplication`).

      Downstream tasks consume the upstream output by reading
      `item_verdicts` and dropping items whose verdict is REJECT.
      Items with verdict=REVIEW are kept but flagged in the
      composed output's issues.
    type: array
    minItems: 1
    items:
      type: object
      required:
      - target
      - verdict
      - scores
      - rationale
      properties:
        target:
          description: >-
            Exact name of the item being scored, or `null` for
            whole-output dimensions.
          type:
          - string
          - 'null'
        verdict:
          description: >-
            Per-item verdict, derived from `scores`: any FAIL → REJECT,
            otherwise any REVIEW → REVIEW, otherwise ACCEPT.
          type: string
          enum:
          - ACCEPT
          - REVIEW
          - REJECT
        scores:
          description: >-
            Map of dimension name → score. Keys MUST appear in the
            top-level `_rubric` definitions. A dimension may be
            omitted only when it is genuinely not applicable to this
            item (note in rationale).
          type: object
          minProperties: 1
          additionalProperties:
            type: string
            enum:
            - PASS
            - REVIEW
            - FAIL
        rationale:
          description: >-
            Evidence-cited explanation for this item's verdict. Quote
            the source or name the offending field. Do not score by
            gut.
          type: string
          minLength: 10
  issues:
    description: >-
      Auxiliary issues that don't fit into per-item rubric (e.g.,
      schema-level violations the judge wants to surface). Most
      judges should leave this empty since item_verdicts already
      captures everything needed for downstream filtering.
    type: array
    items:
      type: object
      required:
      - severity
      - category
      - message
      - target
      properties:
        severity:
          type: string
          enum:
          - error
          - warning
        category:
          type: string
        message:
          type: string
        target:
          type:
          - string
          - 'null'
