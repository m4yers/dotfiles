type: object
required: [citations]
properties:
  citations:
    type: array
    items:
      oneOf:
        # ── Variant 1: paper / preprint ──
        # Academic publications with venue, year, doi.
        - type: object
          additionalProperties: false
          required: [type, title, authors, year, venue, doi, url, source_quote]
          properties:
            type:         {type: string, enum: [paper, preprint]}
            title:        {type: string}
            authors:      {type: array, items: {type: string}, minItems: 1}
            year:         {type: ["integer", "null"], minimum: 1900, maximum: 2100}
            venue:        {type: ["string", "null"]}
            doi:          {type: ["string", "null"], pattern: "^10\\..*"}
            url:          {type: ["string", "null"], pattern: "^https?://"}
            source_quote: {type: string}

        # ── Variant 2: book ──
        # Long-form publications; year and publisher matter.
        - type: object
          additionalProperties: false
          required: [type, title, authors, year, publisher, source_quote]
          properties:
            type:         {const: book}
            title:        {type: string}
            authors:      {type: array, items: {type: string}, minItems: 1}
            year:         {type: ["integer", "null"], minimum: 1500, maximum: 2100}
            publisher:    {type: ["string", "null"]}
            source_quote: {type: string}

        # ── Variant 3: article ──
        # Web-published article; URL is more important than venue.
        - type: object
          additionalProperties: false
          required: [type, title, authors, url, source_quote]
          properties:
            type:         {const: article}
            title:        {type: string}
            authors:      {type: array, items: {type: string}}
            url:          {type: ["string", "null"], pattern: "^https?://"}
            source_quote: {type: string}

        # ── Variant 4: report ──
        # Technical reports, white papers, standards.
        - type: object
          additionalProperties: false
          required: [type, title, authors, year, publisher, url, source_quote]
          properties:
            type:         {const: report}
            title:        {type: string}
            authors:      {type: array, items: {type: string}}
            year:         {type: ["integer", "null"], minimum: 1900, maximum: 2100}
            publisher:    {type: ["string", "null"]}
            url:          {type: ["string", "null"], pattern: "^https?://"}
            source_quote: {type: string}
