# Output of `gather-update` human task. Carries the picked
# skill's canonical locate shape (skill_dir + category, copied
# from the find-skill landscape entry) so the audit core and
# checks-report read it directly — no separate locate task.
type: object
required: [name, namespace, path, type, skill_dir, category, description]
additionalProperties: false
properties:
  name:
    type: string
    description: kebab-case skill name (picked from find-skill.skills)
  namespace:
    type: string
    description: namespace where the skill lives
  path:
    type: string
    description: absolute path to the skill directory
  type:
    type: string
    description: skill type forwarded from find-skill (interface, tool, workflow, reference)
  skill_dir:
    type: string
    description: skill directory (== path); locate-shape field for the audit core
  category:
    type: string
    description: first namespace component (e.g. home, aws); locate-shape field
  description:
    type: string
    description: free-form description of the changes the user wants
