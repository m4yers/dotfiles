type: object
required: [findings]
properties:
  findings:
    type: array
    items:
      type: object
      required: [title, file_line, description, fix, severity]
      properties:
        title:
          type: string
          minLength: 1
        file_line:
          type: string
        description:
          type: string
          minLength: 1
        fix:
          type: string
          minLength: 1
        severity:
          type: string
          enum: [Error, Warning, Info]
        source:
          type: string
        rule_fun:
          type: string
          description: |
            Check function that produced the finding (e.g.
            'rule_2_2_activity_pattern'). Empty for advisory
            findings without a backing rule function.
        rule_ref:
          type: string
          description: |
            Path:rule-number link to the rule's source in the
            references markdown (e.g.
            'references/workflow-conventions.md:2.2'). The
            rule-number form is stable across line edits.
