type: object
required: [findings]
properties:
  findings:
    type: array
    items:
      type: object
      required: [title, file_line, description, fix, severity]
      properties:
        title:
          type: string
          minLength: 1
        file_line:
          type: string
        description:
          type: string
          minLength: 1
        fix:
          type: string
          minLength: 1
        severity:
          type: string
          enum: [Error, Warning, Info]
        source:
          type: string
